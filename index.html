<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mining Platform</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .balance { font-size: 40px; color: #ffca28; margin-bottom: 20px; }
        button { background: #ffca28; border: none; padding: 15px 30px; border-radius: 10px; font-weight: bold; width: 80%; margin: 10px 0; font-size: 18px; }
    </style>
</head>
<body>
    <div class="balance" id="balance">0.000000 USDT</div>
    <div style="margin-bottom: 40px; color: #888;">Мощность: 1.00 TH/s</div>
    
    <button onclick="deposit()">ДЕПОЗИТ</button>
    <button style="background: #333; color: #fff;">ВЫВОД</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        let bal = parseFloat(localStorage.getItem('m_bal')) || 0;

        setInterval(() => {
            bal += 0.000001;
            document.getElementById('balance').innerText = bal.toFixed(6) + " USDT";
            localStorage.setItem('m_bal', bal);
        }, 1000);

        function deposit() {
            tg.showConfirm("Создать счет на 5 USDT?", (confirm) => {
                if (confirm) {
                    tg.openTelegramLink("https://t.me/CryptoBot?start=pay");
                }
            });
        }
    </script>
</body>
</html>
