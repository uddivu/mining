<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop Stars Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --accent: #00ff88; --text: #fff; --sub: #888; --border: #222; --btn-grad: linear-gradient(90deg, #00ff88, #00cc6e); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        .page { display: none; height: 100vh; padding: 20px 16px 110px; overflow-y: auto; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        .label { color: var(--sub); font-size: 10px; text-transform: uppercase; font-weight: 800; letter-spacing: 1px; }
        .val-main { font-size: 42px; font-weight: 900; letter-spacing: -1px; margin: 5px 0; }
        
        /* Солидные кнопки без лишних смайлов */
        .btn { border: none; border-radius: 14px; padding: 16px; font-size: 14px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-primary { background: #fff; color: #000; }
        .btn-accent { background: var(--btn-grad); color: #000; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: #fff; }
        .btn:active { transform: scale(0.97); opacity: 0.9; }

        /* Премиальные модалки */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(8px); }
        .modal-content { background: #151515; border: 1px solid #333; border-radius: 24px; padding: 25px; width: 100%; max-width: 360px; text-align: center; }
        .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 12px; }
        .modal-text { color: var(--sub); font-size: 14px; line-height: 1.5; margin-bottom: 20px; }

        /* Навигация */
        .nav { position: fixed; bottom: 0; width: 100%; background: #080808; border-top: 1px solid var(--border); display: flex; padding: 10px 5px 25px; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 9px; color: var(--sub); font-weight: 700; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-icon { font-size: 18px; margin-bottom: 4px; display: block; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .hist-item { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #1a1a1a; font-size: 13px; }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
            <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                <span class="label">ОНЛАЙН</span><br><b id="online-count" style="font-size: 16px;">...</b>
            </div>
            <div class="card" style="flex: 1; text-align: center; padding: 12px;">
                <span class="label">ВЫПЛАЧЕНО</span><br><b style="color:var(--accent); font-size: 16px;">2482.11</b>
            </div>
        </div>

        <div class="card" style="border-color: #222;">
            <div id="mining-status" style="color:var(--accent); font-size:10px; font-weight: 900; margin-bottom:8px;">ACTIVE MINING PROCESS</div>
            <div class="val-main" id="m-bal">0.000000</div>
            <div style="display: flex; justify-content: space-between; margin-top: 15px;">
                <span class="label">SPEED: <span id="p-val" style="color:#fff">1.25</span> TH/s</span>
                <span class="label">DAILY: <span id="daily-income" style="color:#fff">0.12</span> USDT</span>
            </div>
            <button id="collect-btn" class="btn btn-outline" style="margin-top:20px; font-size: 12px;" onclick="showCollectModal()">Собрать прибыль</button>
        </div>

        <div class="label" style="margin: 5px 0 10px 5px;">Живая лента выплат</div>
        <div class="card" style="padding: 0; overflow: hidden;" id="payouts"></div>
    </div>

    <div id="profile" class="page">
        <h2 style="font-weight: 900; margin-bottom: 25px;">Аккаунт</h2>
        
        <div class="card" style="background: linear-gradient(145deg, #111, #050505); border-color: #333;">
            <span class="label">Доступный баланс</span>
            <div style="display: flex; align-items: baseline; gap: 8px;">
                <div class="val-main" id="profile-bal">0.00</div>
                <span style="font-weight: 800; color: var(--sub)">USDT</span>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="btn btn-accent" onclick="showDepositModal()">Пополнить мощность</button>
            <button class="btn btn-outline" onclick="showModal('Вывод средств', 'Минимальная сумма: 10 USDT. На вашем балансе недостаточно средств.')">Вывести на кошелек</button>
            <button class="btn btn-outline" onclick="showModal('Мои чеки', 'История операций обновляется...')">История операций</button>
            <button class="btn btn-outline" style="margin-top: 20px; color: var(--sub); border-color: #222;" onclick="tg.openTelegramLink('https://t.me/your_support')">Поддержка</button>
        </div>
        <div style="text-align: center; margin-top: 25px; opacity: 0.2; font-size: 10px;" id="u-id">ID: ...</div>
    </div>

    <div id="friends" class="page">
        <h2 style="font-weight: 900;">Друзья</h2>
        <div class="card">
            <span class="label">Условия</span>
            <div style="font-size:18px; font-weight:800; margin: 10px 0;">+10% от пополнений друзей</div>
        </div>
        <button class="btn btn-primary" onclick="inviteFriend()">Пригласить</button>
    </div>

    <div id="quests" class="page">
        <h2 style="font-weight: 900;">Квесты</h2>
        <div id="quest-list"></div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('home')"><span class="nav-icon">🏠</span>ГЛАВНАЯ</div>
        <div class="nav-item" onclick="tab('friends')"><span class="nav-icon">👥</span>ДРУЗЬЯ</div>
        <div class="nav-item" onclick="tab('quests')"><span class="nav-icon">🏆</span>КВЕСТЫ</div>
        <div class="nav-item" onclick="tab('profile')"><span class="nav-icon">👤</span>ПРОФИЛЬ</div>
    </nav>

    <div id="custom-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div id="modal-title" class="modal-title"></div>
            <div id="modal-text" class="modal-text"></div>
            <button class="btn btn-primary" id="modal-btn" onclick="closeModal()">Понятно</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let data = {
            mBal: parseFloat(localStorage.getItem('m_bal')) || 0,
            wBal: parseFloat(localStorage.getItem('w_bal')) || 0,
            power: parseFloat(localStorage.getItem('power')) || 1.25,
            lastUpdate: Date.now()
        };

        // 1. УМНЫЙ ОНЛАЙН
        function getOnline() {
            const h = new Date().getHours();
            const seed = Math.floor(Date.now() / 300000);
            const base = (h >= 23 || h < 6) ? 220 : 610;
            return base + (seed % 180);
        }

        // 2. ДИНАМИЧЕСКАЯ ЛЕНТА (Зависит от онлайна)
        const poolNames = ["dark_soul", "moon_boy", "maka_95", "crypto_wolf", "alina_invest", "max_payne", "denis_top", "R_invest", "Kala78", "Nr_crypto", "Tumenec", "Sasha_Gray", "Ivan_Trade"];
        let currentPayouts = [{n: "dark_soul", a: "14.27"}, {n: "moon_boy", a: "35.73"}, {n: "maka_95", a: "31.96"}];
        let lastPayoutTime = 0;

        function updateLiveFeed() {
            const online = getOnline();
            const now = Date.now();
            
            // Расчет интервала: при 200 онлайне ~ 120 сек, при 800 онлайне ~ 20 сек
            let threshold = online > 600 ? 30000 : 120000;
            
            if (now - lastPayoutTime > threshold) {
                const name = poolNames[Math.floor(Math.random() * poolNames.length)];
                // Хаотичная сумма с копейками
                const amount = (10 + Math.random() * 40).toFixed(2);
                
                currentPayouts.unshift({ n: name, a: amount });
                if (currentPayouts.length > 4) currentPayouts.pop();
                lastPayoutTime = now;
                renderFeed();
            }
        }

        function renderFeed() {
            const box = document.getElementById('payouts');
            box.innerHTML = currentPayouts.map((p, i) => `
                <div class="hist-item" style="opacity: ${i === 0 ? '1' : '0.4'}; transition: 0.5s;">
                    <b>${p.n}</b> <span style="color:#444">вывел</span> <b style="color:var(--accent)">+${p.a} USDT</b>
                </div>
            `).join('');
        }

        // 3. ИНТЕРФЕЙС И МОДАЛКИ
        function showModal(title, text, btnText = "Понятно", callback = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            const btn = document.getElementById('modal-btn');
            btn.innerText = btnText;
            btn.onclick = () => { closeModal(); if(callback) callback(); };
            document.getElementById('custom-modal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }

        function showDepositModal() {
            showModal('Пополнение мощности', '1 USDT = +1.25 TH/s\nВведите сумму пополнения в боте.', 'Купить', () => {
                tg.openTelegramLink("http://t.me/send?start=IVubelJ5G9NB");
            });
        }

        function showCollectModal() {
            if(data.mBal < 1) {
                showModal('Накопите средства', 'Минимальный сбор возможен от 1.00 USDT.');
            } else {
                data.wBal += data.mBal; data.mBal = 0;
                localStorage.setItem('w_bal', data.wBal);
                updateUI();
                showModal('Успешно', 'Прибыль переведена на баланс вывода.');
            }
        }

        // 4. ЦИКЛЫ
        setInterval(() => {
            data.mBal += (data.power * 0.0000014);
            if(document.getElementById('m-bal')) document.getElementById('m-bal').innerText = data.mBal.toFixed(6);
            localStorage.setItem('m_bal', data.mBal);
            updateLiveFeed();
            document.getElementById('online-count').innerText = getOnline();
        }, 1000);

        function tab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            updateUI();
        }

        function updateUI() {
            if(document.getElementById('profile-bal')) document.getElementById('profile-bal').innerText = data.wBal.toFixed(2);
            if(document.getElementById('p-val')) document.getElementById('p-val').innerText = data.power.toFixed(2);
            if(document.getElementById('daily-income')) document.getElementById('daily-income').innerText = (data.power * 0.096).toFixed(2);
            if(tg.initDataUnsafe.user) document.getElementById('u-id').innerText = "ID: " + tg.initDataUnsafe.user.id;
        }

        function inviteFriend() {
            const url = `https://t.me/DropStarsBot?start=ref${tg.initDataUnsafe.user?.id || '0'}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=Заходи в Drop Stars Pro!`);
        }

        updateUI(); renderFeed();
    </script>
</body>
</html>
