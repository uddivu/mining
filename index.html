<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Drop Stars Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #000; --card: #111; --accent: #00ff88; --text: #fff; --sub: #666; --border: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; overflow: hidden; letter-spacing: -0.2px; }
        
        .page { display: none; height: 100vh; padding: 20px 16px 130px; overflow-y: auto; }
        .page.active { display: block; animation: fadeIn 0.3s ease; }

        .card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; margin-bottom: 16px; }
        .label { color: var(--sub); font-size: 11px; text-transform: uppercase; font-weight: 700; letter-spacing: 0.5px; }
        .val-main { font-size: 40px; font-weight: 800; letter-spacing: -1px; margin: 8px 0; }
        
        .btn { border: none; border-radius: 16px; padding: 20px; font-size: 13px; font-weight: 700; cursor: pointer; width: 100%; transition: 0.2s; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-primary { background: #fff; color: #000; }
        .btn-accent { background: var(--accent); color: #000; }
        .btn-outline { background: #1a1a1a; border: 1px solid var(--border); color: #fff; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .btn:disabled { opacity: 0.2; cursor: not-allowed; }

        .nav { position: fixed; bottom: 0; width: 100%; background: rgba(8,8,8,0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--border); display: flex; padding: 12px 10px 35px; z-index: 1000; }
        .nav-item { flex: 1; text-align: center; font-size: 10px; color: #444; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--accent); }
        .nav-dot { width: 4px; height: 4px; background: currentColor; border-radius: 50%; margin: 6px auto 0; opacity: 0; }
        .nav-item.active .nav-dot { opacity: 1; }

        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; padding: 24px; backdrop-filter: blur(15px); }
        .modal-content { background: #111; border: 1px solid #222; border-radius: 28px; padding: 32px; width: 100%; max-width: 340px; text-align: center; }

        .hist-item { display: flex; justify-content: space-between; padding: 16px 0; border-bottom: 1px solid #161616; font-size: 13px; font-weight: 500; }
        .info-note { font-size: 11px; color: #ffcc00; margin-top: 15px; line-height: 1.4; font-weight: 600; opacity: 0.9; }
        
        /* Анимация пульсации для кнопки запуска */
        .pulse { animation: pulse-animation 2s infinite; }
        @keyframes pulse-animation { 0% { box-shadow: 0 0 0 0px rgba(0, 255, 136, 0.4); } 100% { box-shadow: 0 0 0 20px rgba(0, 255, 136, 0); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="home" class="page active">
        <div class="card" style="border: none; background: linear-gradient(145deg, #111, #000);">
            <span class="label">Баланс к выводу</span>
            <div style="display:flex; justify-content:space-between; align-items:baseline;">
                <div class="val-main" id="w-bal-home">0.00</div>
                <div style="font-weight: 700; color: var(--sub); font-size: 14px;">USDT</div>
            </div>
        </div>

        <div class="card" id="mining-card">
            <div id="mining-status" style="color:var(--sub); font-size:10px; font-weight: 800; margin-bottom:12px; text-transform: uppercase;">ОЖИДАНИЕ ЗАПУСКА</div>
            <div class="val-main" style="font-family: monospace;" id="m-bal">0.000000</div>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 20px 0; border-top: 1px solid #1a1a1a; padding-top: 20px;">
                <div><span class="label">Мощность</span><br><b id="p-val" style="color:var(--accent); font-size:16px;">1.25</b> <small style="color:var(--sub)">TH/s</small></div>
                <div><span class="label">Таймер</span><br><b id="timer" style="font-size:16px;">--:--:--</b></div>
            </div>
            
            <div id="mining-actions">
                <button id="start-mining-btn" class="btn btn-accent pulse" onclick="startMining()">ЗАПУСТИТЬ МАЙНИНГ</button>
            </div>
            <button id="collect-btn" class="btn btn-outline" style="margin-top:12px; display:none;" onclick="showCollectModal()">Собрать прибыль</button>
        </div>

        <div class="label" style="margin: 8px 0 12px 4px;">Живая лента выплат</div>
        <div id="payouts" style="padding: 0 4px;"></div>
    </div>

    <div id="friends" class="page">
        <h2 style="font-weight: 800; font-size: 28px;">Друзья</h2>
        <div class="card"><span class="label">Бонус</span><div style="font-size:20px; font-weight:800; margin: 12px 0;">+10% от пополнений</div></div>
        <button class="btn btn-primary" onclick="inviteFriend()">Пригласить</button>
        <div class="label" style="margin: 24px 0 12px 4px;">Рефералы: <span id="ref-count">0</span></div>
    </div>

    <div id="quests" class="page">
        <h2 style="font-weight: 800; font-size: 28px;">Квесты</h2>
        <div id="quest-list"></div>
    </div>

    <div id="profile" class="page">
        <h2 style="font-weight: 800; font-size: 28px;">Профиль</h2>
        <div class="card" style="background: #111;">
            <span class="label">Баланс</span>
            <div class="val-main" id="profile-bal">0.00</div>
        </div>
        <div style="display: flex; flex-direction: column; gap: 12px;">
            <button class="btn btn-accent" onclick="showDepositModal()">Пополнить</button>
            <button class="btn btn-outline" onclick="showSupport()">Поддержка</button>
        </div>
    </div>

    <nav class="nav">
        <div class="nav-item active" onclick="tab('home')">ГЛАВНАЯ<div class="nav-dot"></div></div>
        <div class="nav-item" onclick="tab('friends')">ДРУЗЬЯ<div class="nav-dot"></div></div>
        <div class="nav-item" onclick="tab('quests')">КВЕСТЫ<div class="nav-dot"></div></div>
        <div class="nav-item" onclick="tab('profile')">ПРОФИЛЬ<div class="nav-dot"></div></div>
    </nav>

    <div id="custom-modal" class="modal-overlay"><div class="modal-content"><div id="modal-title" style="font-size:18px; font-weight:800;"></div><div id="modal-text" style="color:#888; margin:15px 0;"></div><div id="modal-action-container"></div><button class="btn btn-primary" onclick="closeModal()">ЗАКРЫТЬ</button></div></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        let data = {
            mBal: parseFloat(localStorage.getItem('m_bal')) || 0,
            wBal: parseFloat(localStorage.getItem('w_bal')) || 0,
            power: parseFloat(localStorage.getItem('power')) || 1.25,
            miningEnd: parseInt(localStorage.getItem('m_end')) || 0, // 0 значит не запущен
            refs: parseInt(localStorage.getItem('refs')) || 0,
            quests: JSON.parse(localStorage.getItem('q_done')) || []
        };

        // ЗАПУСК МАЙНИНГА
        function startMining() {
            data.miningEnd = Date.now() + 86400000; // +24 часа
            localStorage.setItem('m_end', data.miningEnd);
            
            // Здесь будет запрос к твоему будущему серверу в Termux
            sendReferralData(); 

            updateUI();
            showModal('Успех', 'Майнинг запущен на 24 часа! Возвращайтесь завтра.');
        }

        function sendReferralData() {
            // Когда сделаем сервер, здесь будет:
            // fetch('/api/activate?user=' + tg.initDataUnsafe.user.id);
            console.log("Сигнал серверу: майнинг активирован, проверь реферала");
        }

        // ОБНОВЛЕНИЕ ТАЙМЕРА И БАЛАНСА
        setInterval(() => {
            const now = Date.now();
            if (data.miningEnd > now) {
                // Майнинг идет
                let diff = data.miningEnd - now;
                let h = Math.floor(diff/3600000), m = Math.floor((diff%3600000)/60000), s = Math.floor((diff%60000)/1000);
                document.getElementById('timer').innerText = `${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
                
                data.mBal += (data.power * 0.0000014); // Скорость начисления
                document.getElementById('m-bal').innerText = data.mBal.toFixed(6);
                localStorage.setItem('m_bal', data.mBal);

                document.getElementById('mining-status').innerText = "МАЙНИНГ АКТИВЕН";
                document.getElementById('mining-status').style.color = "var(--accent)";
                document.getElementById('start-mining-btn').style.display = "none";
                document.getElementById('collect-btn').style.display = "block";
                document.getElementById('mining-card').style.borderLeft = "4px solid var(--accent)";
            } else {
                // Майнинг стоит
                document.getElementById('timer').innerText = "00:00:00";
                document.getElementById('mining-status').innerText = "МАЙНИНГ ОСТАНОВЛЕН";
                document.getElementById('mining-status').style.color = "var(--sub)";
                document.getElementById('start-mining-btn').style.display = "block";
                document.getElementById('start-mining-btn').innerText = data.miningEnd === 0 ? "ЗАПУСТИТЬ МАЙНИНГ" : "ПЕРЕЗАПУСТИТЬ";
                document.getElementById('mining-card').style.borderLeft = "4px solid var(--border)";
            }
        }, 1000);

        // Остальные функции (tab, closeModal, showModal, showSupport и т.д.)
        function tab(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
            updateUI();
        }

        function showModal(title, text, actionFn = null, actionBtnText = "OK") {
            const overlay = document.getElementById('custom-modal');
            const container = document.getElementById('modal-action-container');
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            container.innerHTML = '';
            if(actionFn) {
                const btn = document.createElement('button');
                btn.className = 'btn btn-accent';
                btn.style.marginBottom = '12px';
                btn.innerText = actionBtnText;
                btn.onclick = () => { overlay.style.display = 'none'; actionFn(); };
                container.appendChild(btn);
            }
            overlay.style.display = 'flex';
        }

        function closeModal() { document.getElementById('custom-modal').style.display = 'none'; }
        
        function showSupport() {
            tg.openTelegramLink("https://t.me/Supporrtt_mayinggbot");
        }

        function showDepositModal() {
            showModal('Пополнение', '1 USDT = +1.25 TH/s', () => {
                tg.openTelegramLink("https://t.me/send?start=IVubelJ5G9NB");
            }, 'КУПИТЬ');
        }

        function updateUI() {
            document.getElementById('w-bal-home').innerText = data.wBal.toFixed(2);
            document.getElementById('profile-bal').innerText = data.wBal.toFixed(2);
            document.getElementById('p-val').innerText = data.power.toFixed(2);
            document.getElementById('ref-count').innerText = data.refs;
        }
        
        // Лента выплат (упрощенно)
        function updateLiveFeed() {
            const n = ["Sanya", "Dmitry", "Elena", "Maks", "Andrey", "Oleg", "Ivan"];
            let html = "";
            for(let i=0; i<3; i++) {
                html += `<div class="hist-item"><span>${n[Math.floor(Math.random()*n.length)]}</span><span style="color:var(--accent)">+${(Math.random()*15+5).toFixed(1)} USDT</span></div>`;
            }
            document.getElementById('payouts').innerHTML = html;
        }
        updateLiveFeed();
        updateUI();
    </script>
</body>
</html>
